services:
  mysql:
    image: mysql:8.0
    container_name: webphim-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-123456}
      MYSQL_DATABASE: ${DB_NAME:-Cinema_DB}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: webphim-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-webphim-secret-redis}

volumes:
  mysql_data:
  redis_data:
